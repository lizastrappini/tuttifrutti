<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tutti Frutti Argento</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --celeste: #74ACDF;
      --blanco: #F4F4F0;
      --amarillo: #F6C90E;
      --negro: #111111;
      --rojo: #D94F3D;
      --gris: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--negro);
      color: var(--blanco);
      font-family: 'Archivo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Fondo con rayas diagonales tipo camiseta argentina */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 40px,
        rgba(116, 172, 223, 0.04) 40px,
        rgba(116, 172, 223, 0.04) 80px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Ruido de fondo */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: min(600px, 90vw);
      text-align: center;
    }

    /* Encabezado */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 48px;
    }

    .eyebrow {
      font-family: 'Archivo', sans-serif;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--celeste);
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 15vw, 120px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--blanco);
      position: relative;
    }

    h1 span.highlight {
      color: var(--amarillo);
      position: relative;
      display: inline-block;
    }

    h1 span.highlight::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--celeste);
      z-index: -1;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 400;
      color: rgba(244,244,240,0.45);
      margin-top: 16px;
      letter-spacing: 0.05em;
    }

    /* Tarjeta de categoría */
    .card {
      width: 100%;
      background: var(--gris);
      border: 2px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 48px 36px;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      transition: border-color 0.3s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--celeste), var(--amarillo), var(--celeste));
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card.active::before { opacity: 1; }
    .card.active { border-color: rgba(116,172,223,0.3); }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .placeholder-text {
      font-size: 14px;
      color: rgba(244,244,240,0.2);
      letter-spacing: 0.1em;
      font-weight: 700;
      text-transform: uppercase;
      transition: opacity 0.2s ease;
    }

    .categoria-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 6vw, 46px);
      line-height: 1.1;
      color: var(--blanco);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      display: none;
    }

    .categoria-text.visible {
      opacity: 1;
      transform: translateY(0);
      display: block;
    }

    /* Número de categoría */
    .card-number {
      position: absolute;
      top: 14px;
      right: 18px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      color: rgba(244,244,240,0.15);
      letter-spacing: 0.1em;
    }

    /* Botón */
    .btn {
      width: 100%;
      padding: 20px 32px;
      background: var(--amarillo);
      color: var(--negro);
      border: none;
      border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.12em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 0 #b89a00, 0 6px 20px rgba(246,201,14,0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #b89a00, 0 12px 30px rgba(246,201,14,0.3);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b89a00, 0 3px 10px rgba(246,201,14,0.2);
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s ease;
    }

    .btn:hover::after {
      background: rgba(255,255,255,0.1);
    }

    /* Contador */
    .counter {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(244,244,240,0.25);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 700;
      height: 16px;
    }

    /* Estrellas decorativas */
    .star {
      position: fixed;
      font-size: 10px;
      color: var(--celeste);
      opacity: 0.15;
      pointer-events: none;
      animation: twinkle 4s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.3; }
    }

    /* Animación de shuffle en el texto */
    @keyframes shuffleIn {
      0%   { opacity: 0; transform: translateY(16px) skewX(-3deg); }
      60%  { opacity: 1; transform: translateY(-3px) skewX(0); }
      100% { opacity: 1; transform: translateY(0) skewX(0); }
    }

    .categoria-text.animate {
      animation: shuffleIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  </style>
</head>
<body>

  <!-- Estrellas decorativas -->
  <div class="star" style="top:8%; left:5%; animation-delay:0s">★</div>
  <div class="star" style="top:15%; right:8%; animation-delay:1.2s">★</div>
  <div class="star" style="bottom:20%; left:7%; animation-delay:0.6s">★</div>
  <div class="star" style="bottom:12%; right:6%; animation-delay:2s">★</div>
  <div class="star" style="top:45%; left:2%; animation-delay:1.8s; font-size:7px">★</div>
  <div class="star" style="top:60%; right:3%; animation-delay:0.3s; font-size:7px">★</div>

  <div class="container">
    <div class="header">
      <p class="eyebrow">El juego de los argentinos</p>
      <h1>TUTTI<br><span class="highlight">FRUTTI</span></h1>
      <p class="subtitle">Presioná el botón y prepárate para sufrir</p>
    </div>

    <div class="card" id="card">
      <span class="card-number" id="cardNumber"></span>
      <p class="placeholder-text" id="placeholder">Tu categoría aparece acá</p>
      <p class="categoria-text" id="categoria"></p>
    </div>

    <button class="btn" id="btn" onclick="obtenerCategoria()">
      OBTENER CATEGORÍA
    </button>

    <p class="counter" id="counter"></p>
  </div>

  <script>
    const categorias = [
      "Cosas que podés decir cogiendo y comiendo",
      "Frases que podría decir tu vieja",
      "Excusas para no ir al gimnasio",
      "Palabras que solo entiende un argentino",
      "Cosas que pasan en un cumpleaños de 15",
      "Lo que dice tu tío en el asado cuando habla de política",
      "Nombres que podría tener un kiosco de barrio",
      "Cosas que vende un chino a las 3am",
      "Cosas que San Martín nunca dijo",
      "Nombre que puede tener una banda indie",
      "Excusas para irse de una cita",
      "Cosas que deberían ser delito",
      "Nombres que podrían tener un villero",
      "Cosas que dice un taxista sin que le preguntes",
      "Apodos no racistas para un negro",
      "Cosas que podría vender un mantero",
      "Frases que podría decir un politico",
      "Frase desubicadas para decir en un velorio",
      "Nombres de libros de autoayuda",
      "Cosas que son muy de rico o muy de pobre",
      "Cosas que le harías a una vieja",
      "Frases que podría decir una pick me girl",
      "Frases homofobicas ocultas",
      "Nombre que podría tener un video porno",
      "Frases de facho",
      "Es de marrón...",
      "No quiero juzgar, pero...",
      "Excusas para no cojer",
      "Nombres que podría tener un telo",
      "Cosas que son muy fondo de olla",
      "Frases que podría decir un papa luchon",
      "Motivos por los que podrías ir en cana",
      "Excusas para faltar al laburo",
      "Cosas que desatan una pelea familiar en la mesa"

    ];

    let usadas = [];
    let ultimaCategoria = null;
    let total = categorias.length;

    function obtenerCategoria() {
      // Si ya usamos todas, reseteamos
      if (usadas.length === total) {
        usadas = [];
      }

      // Disponibles (sin repetir la última)
      let disponibles = categorias.filter(c => !usadas.includes(c) && c !== ultimaCategoria);
      if (disponibles.length === 0) disponibles = categorias.filter(c => c !== ultimaCategoria);

      const idx = Math.floor(Math.random() * disponibles.length);
      const elegida = disponibles[idx];
      usadas.push(elegida);
      ultimaCategoria = elegida;

      mostrarCategoria(elegida);
      actualizarContador();
    }

    function mostrarCategoria(texto) {
      const card = document.getElementById('card');
      const placeholder = document.getElementById('placeholder');
      const categoriaEl = document.getElementById('categoria');
      const cardNumber = document.getElementById('cardNumber');

      // Ocultar placeholder
      placeholder.style.opacity = '0';
      placeholder.style.display = 'none';

      // Resetear animación
      categoriaEl.classList.remove('visible', 'animate');
      categoriaEl.style.display = 'block';
      categoriaEl.textContent = texto;

      void categoriaEl.offsetWidth; // forzar reflow

      categoriaEl.classList.add('visible', 'animate');
      card.classList.add('active');

      // Número de categoría
      const num = categorias.indexOf(texto) + 1;
      cardNumber.textContent = `${String(num).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
    }

    function actualizarContador() {
      const counter = document.getElementById('counter');
      if (usadas.length === total) {
        counter.textContent = '¡Diste vuelta el mazo! Empezando de nuevo...';
        setTimeout(() => { counter.textContent = ''; }, 2500);
      }
    }
  </script>

</body>
</html>
